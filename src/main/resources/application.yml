server:
  port: 8080

spring:
  application:
    name: distributed-rate-limiter
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

rate-limiter:
  default-capacity: 10
  default-refill-tokens: 5
  default-refill-period-seconds: 10

logging:
  level:
    com.hbb.ratelimiter: DEBUG
